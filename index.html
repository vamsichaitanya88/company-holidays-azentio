<style>
:root {
  --ink: #0f1117;
  --paper: #f7f5f0;
  --accent: #1a6b4a;
  --accent2: #e85d26;
  --accent3: #2d5fa6;
  --muted: #8a8a8a;
  --border: #e0ddd7;
  --card: #ffffff;
  --warn: #f0a500;
  --weekend-bg: #fdf3f0;
  --optional-bg: #f0f6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  
}

/* HEADER */
.site-header {
  background: var(--ink);
  padding: 32px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  
  
  border-bottom: 3px solid var(--accent);
}
.logo-block { display: flex; align-items: center; gap: 14px; }
.logo-icon {
  width: 38px; height: 38px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Serif Display', serif;
  color: #fff; font-size: 18px; font-weight: 400;
}
.logo-text { color: #fff; }
.logo-text .name { font-family: 'DM Serif Display', serif; font-size: 22px; }
.logo-text .subtitle { font-size: 12px; color: #888; letter-spacing: .08em; text-transform: uppercase; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.today-badge {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 100px;
  padding: 6px 14px;
  color: #ccc;
  font-size: 12px;
}

/* SEARCH + FILTERS */
.controls {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 18px 48px;
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}
.search-wrap {
  flex: 1; min-width: 220px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  background: var(--paper);
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 15px;
}
.filter-btn {
  padding: 9px 16px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--paper);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  color: var(--ink);
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.result-count {
  font-size: 12px; color: var(--muted);
  white-space: nowrap;
}

/* MAIN LAYOUT */
.page-body { display: flex; }
.country-nav {
  width: 200px;
  flex-shrink: 0;
  padding: 24px 0;
  position: relative;
  top: 96px;
  max-height: 600px;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--card);
}
.country-nav::-webkit-scrollbar { width: 4px; }
.country-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.nav-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  padding: 12px 20px 4px;
}
.nav-country {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink);
  border-left: 3px solid transparent;
  transition: all .12s;
}
.nav-country:hover { background: var(--paper); }
.nav-country.active { border-left-color: var(--accent); background: #f0f9f5; color: var(--accent); font-weight: 600; }
.nav-country.hidden { display: none; }
.flag { font-size: 16px; line-height: 1; }
.count-pill {
  margin-left: auto;
  font-size: 10px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 1px 6px;
  color: var(--muted);
}
.nav-country.active .count-pill { background: #d4edde; border-color: #a8d8bb; color: var(--accent); }

/* CONTENT */
.content-area {
  flex: 1;
  padding: 32px 40px;
  overflow-y: auto;
}
.country-section { display: none; }
.country-section.visible { display: block; }

.country-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--ink);
}
.country-title-block { display: flex; align-items: center; gap: 14px; }
.country-flag-lg { font-size: 36px; line-height: 1; }
.country-name {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  line-height: 1.1;
}
.country-subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
.holiday-count-badge {
  background: var(--ink);
  color: #fff;
  font-size: 13px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 100px;
}

/* SECTION HEADERS */
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  margin: 24px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* HOLIDAY TABLE */
.holiday-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 8px;
}
.holiday-table th {
  text-align: left;
  font-size: 10px; font-weight: 600; letter-spacing: .07em;

}
.holiday-table td {

}

.holiday-table tr:hover td { background: #fafaf8; }
.holiday-table.weekend-tbl tr:hover td { background: var(--weekend-bg); }
.holiday-table.optional-tbl tr:hover td { background: var(--optional-bg); }

.date-cell { color: var(--muted); min-width: 160px; }
.day-chip {

  font-size: 10px; font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 6px;
  background: var(--paper);
  border: 1px solid var(--border);

}
.day-chip.mon,.day-chip.tue,.day-chip.wed,.day-chip.thu { background: #e8f5ee; border-color: #b3dcc5; color: #1a6b4a; }
.day-chip.fri { background: #fff3e0; border-color: #ffd08a; color: #b45309; }
.day-chip.sat,.day-chip.sun { background: #fef0ef; border-color: #f5b8ae; color: #c0392b; }

.holiday-name { font-weight: 500; }
.tentative-tag {
  font-size: 10px; color: var(--warn);
  font-weight: 600; margin-left: 6px;
}
.state-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.state-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  background: #e8f5ee; color: #1a6b4a;
  border: 1.5px solid #b3dcc5;
  cursor: default;
  position: relative;
}
.state-dot:hover::after {
  content: attr(data-state);
  position: absolute; bottom: 26px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: #fff;
  font-size: 10px; padding: 3px 7px; border-radius: 4px;
  white-space: nowrap;
  z-index: 10;
}
.sr-cell { color: var(--muted); font-size: 12px; width: 36px; }

/* WEEKEND SECTION */
.weekend-section {
  background: var(--weekend-bg);
  border: 1px solid #f5d5cc;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}
.weekend-section .section-label { padding: 12px 16px 0; margin: 0 0 0; }
.weekend-section .holiday-table { margin-bottom: 0; }
.weekend-section .holiday-table th { background: transparent; }

/* OPTIONAL SECTION */
.optional-section {
  background: var(--optional-bg);
  border: 1px solid #c3d9f5;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}
.optional-section .section-label { padding: 12px 16px 0; margin: 0; }

/* NOTES */
.notes-block {

}

/* STATS BAR */
.stats-row {

.stat-chip.green .num { color: var(--accent); }
.stat-chip.orange .num { color: var(--accent2); }
.stat-chip.blue .num { color: var(--accent3); }

/* INDIA STATE TABLE */
.state-header-row th {
  border-bottom: 2px solid var(--ink) !important;
}

/* SEARCH HIGHLIGHT */
.hl { background: #ffe066; border-radius: 2px; }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 80px 40px;
  color: var(--muted);
}
.empty-state .big { font-size: 48px; margin-bottom: 12px; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .site-header { padding: 20px 20px; }
  .controls { padding: 14px 20px; }
  .country-nav { display: none; }
  .content-area { padding: 20px; }
}

/* ANIMATIONS */
.country-section { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* INDIA STATE TABS */

}
.india-view-btn {

.india-view-btn:last-child { border-right: none; }
.india-view-btn:hover { color: var(--ink); background: #f0f0ec; }
.india-view-btn.active { background: var(--ink); color: #fff; }

.state-tabs-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.state-tab-btn {
  padding: 7px 16px;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: var(--paper);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;

.state-tab-btn:hover { border-color: var(--accent); color: var(--accent); }
.state-tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.state-tab-btn .stcount { font-size: 11px; opacity: .75; }

.state-section { display: none; }
.state-section.visible { display: block; }

.state-header-block {
  display: flex; align-items: center; gap: 10px;

  border: 1px solid #b3dcc5;

}
.state-header-name {

}

}
.state-note {

}

/* Sub-nav state items under India */
.nav-state {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 20px 5px 32px;
  cursor: pointer; font-size: 12px;
  color: var(--muted);
  border-left: 3px solid transparent;
  transition: all .12s;
}
.nav-state:hover { color: var(--ink); background: var(--paper); }
.nav-state.active { color: var(--accent); border-left-color: var(--accent); background: #f0f9f5; font-weight: 600; }
.nav-india-parent.active { color: var(--accent); border-left-color: var(--accent); background: #f0f9f5; font-weight: 600; }

/* ── TODAY BANNER ─────────────────────────────────────── */
.today-banner {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  background: var(--ink);
  border-radius: var(--r);
  padding: 12px 16px;
  margin-bottom: 16px;
  color: #fff;
}
.today-date-block { display: flex; flex-direction: column; }
.today-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #888; }
.today-value { font-size: 18px; font-weight: 700; font-family: 'DM Serif Display', serif; color: #fff; line-height: 1.2; margin-top: 2px; }

.upcoming-list { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.upcoming-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 6px; padding: 5px 10px; }

}

.cal-year-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:16px }

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const COUNTRIES = [
  {
    id: 'india', name: 'India', flag: '🇮🇳', region: 'asia',
    notes: ['Employees working at the client site will observe the client\'s Holiday List.','Employees working in locations other than those specified above will follow leave of the location closest/mapped to them.'],

// ── TODAY + UPCOMING HELPERS ──────────────────────────
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function daysUntil(dt) {
  const d = new Date(dt); d.setHours(0,0,0,0);
  return Math.round((d - TODAY) / 86400000);
}

function countdownPill(hDate) {
  const days = daysUntil(hDate);
  if (days < 0) return '';
  if (days === 0) return `<span class="countdown-pill cp-today">Today!</span>`;
  if (days <= 7) return `<span class="countdown-pill cp-next">In ${days}d</span>`;
  if (days <= 30) return `<span class="countdown-pill cp-soon">In ${days}d</span>`;
  return '';
}

function rowClass(hDate) {
  const days = daysUntil(hDate);
  if (days < 0) return 'row-past';
  if (days === 0) return 'row-today';
  return '';  // applied dynamically after finding the first upcoming
}

function buildUpcomingBanner(allHolidays) {
  // allHolidays: array of {date: 'Thu, 1 Jan', holiday: '...'}
  const dated = allHolidays
    .map(h => ({ ...h, dt: parseDateStr(h.date), days: daysUntil(parseDateStr(h.date)) }))
    .filter(h => h.days >= 0)
    .sort((a,b) => a.days - b.days);

  const upcoming = dated.slice(0, 4);  // show next 4

  const dateStr = TODAY.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  if (!upcoming.length) {
    return `<div class="today-banner">
      <div class="today-date-block"><div class="today-label">Today</div><div class="today-value">${dateStr}</div></div>
      <div class="today-divider"></div>
      <div class="upcoming-block"><div class="upcoming-label">Upcoming holidays</div><div class="upcoming-list"><span style="font-size:12px;color:#888">No more holidays in 2026</span></div></div>
    </div>`;
  }

  const items = upcoming.map((h, i) => {
    const dLabel = h.days === 0 ? 'Today!' : `${h.days}d away`;
    const optTag = h.isOptional ? `<span class="up-optional-tag">optional</span>` : '';
    return `<div class="upcoming-item${i===0?' next-h':''}">
      <div>
        <div class="upcoming-name">${h.holiday}${optTag}</div>
        <div class="upcoming-date-s">${h.date}</div>
      </div>
      <div class="upcoming-days-s">${dLabel}</div>
    </div>`;
  }).join('');

  return `<div class="today-banner">
    <div class="today-date-block"><div class="today-label">Today</div><div class="today-value">${dateStr}</div></div>
    <div class="today-divider"></div>
    <div class="upcoming-block"><div class="upcoming-label">Upcoming holidays</div><div class="upcoming-list">${items}</div></div>
  </div>`;
}

// ── Parse "Thu, 1 Jan" → Date object (2026) ──────────
function parseDateStr(s) {
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parts = s.trim().split(/[\s,]+/);
  const day = parseInt(parts[1]);
  const mon = months[parts[2]];
  return new Date(2026, mon, day);
}
function dateKey2(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function addDays2(dt, n) { const d = new Date(dt); d.setDate(d.getDate()+n); return d; }
function fmtShort(dt) { return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

function holidayRowsMerged(holidays) {
  let nextIdx = -1;
  holidays.forEach((h,i) => { if (nextIdx===-1 && daysUntil(parseDateStr(h.date)) >= 0) nextIdx = i; });
  return holidays.map((h,i) => {
    const days = daysUntil(parseDateStr(h.date));
    let rc = '';
    if (days < 0) rc = 'row-past';
    else if (days === 0) rc = 'row-today';
    else if (i === nextIdx) rc = 'row-next';
    else if (days <= 30) rc = 'row-soon';
    const pill = (days >= 0 && days <= 30) ? countdownPill(parseDateStr(h.date)) : '';
    const optTag = h.isOptional ? '<span class="optional-tag">optional</span>' : '';
    return '<tr class="'+rc+'"><td class="sr-cell">'+(i+1)+'</td><td class="date-cell">'+h.date+' '+getDayChip(h.date)+'</td><td class="holiday-name">'+h.holiday+optTag+pill+'</td></tr>';
  }).join('');
}



function buildHolidaySet(data) {
  const set = {};
  data.fixed.forEach(h => { const d = parseDateStr(h.date); set[dateKey2(d)] = {name:h.holiday,type:'fixed'}; });
  data.weekend.forEach(h => { const d = parseDateStr(h.date); set[dateKey2(d)] = {name:h.holiday,type:'weekend'}; });
  return set;
}

function findLongWeekends(holidaySet, minLen) {
  const hDates = Object.keys(holidaySet).filter(k => holidaySet[k].type==='fixed').sort();
  const results = [];
  const seen = new Set();

  hDates.forEach(hk => {
    const base = new Date(hk);
    // try window starting 3 days before, ending 3 days after
    for (let startOff = -3; startOff <= 0; startOff++) {
      const start = addDays2(base, startOff);
      if (start.getFullYear() !== 2026) continue;
      for (let len = minLen; len <= 7; len++) {
        const end = addDays2(start, len-1);
        if (end.getFullYear() !== 2026) continue;
        const days = [];
        for (let i=0;i<len;i++) days.push(addDays2(start,i));
        const holDays = days.filter(d => holidaySet[dateKey2(d)]?.type==='fixed');
        const wkDays = days.filter(d => { const w=d.getDay(); return w===0||w===6; });
        const wkendHolDays = days.filter(d => holidaySet[dateKey2(d)]?.type==='weekend');
        const offDays = new Set([...holDays.map(dateKey2), ...wkDays.map(dateKey2), ...wkendHolDays.map(dateKey2)]);
        const leaveDays = days.filter(d => !offDays.has(dateKey2(d)));
        if (holDays.length < 1) continue;
        if (leaveDays.length < 1 || leaveDays.length > 3) continue;
        // All days must be contiguous off or leave
        const key = `${dateKey2(start)}_${dateKey2(end)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        results.push({ start, end, totalDays:len, holDays, wkDays, leaveDays, wkendHolDays, key });
      }
    }
  });

  return results
    .filter(r => r.totalDays >= minLen)
    .sort((a,b) => a.start - b.start);
}

// ── PLANNER STATE ─────────────────────────────────────
const plannerState = {};

function rebuildPlanner(stCode, minLen) {
  plannerState[stCode] = plannerState[stCode] || {};
  plannerState[stCode].minLen = minLen;
  plannerState[stCode].selIdx = null;
  renderPlanner(stCode);

function renderPlanner(stCode) {
  const india = COUNTRIES.find(c => c.id === 'india');
  const data = getStateHolidays(stCode);
  const hSet = buildHolidaySet(data);
  const ps = plannerState[stCode] = plannerState[stCode] || {minLen:4, selIdx:null};
  const sugs = findLongWeekends(hSet, ps.minLen);
  ps.sugs = sugs;

  // Summary
  const sumEl = document.getElementById(`lw-summary-${stCode}`);
  if (sumEl) sumEl.innerHTML = `<strong>${sugs.length} long weekend opportunity${sugs.length!==1?'s':''}</strong> found in 2026 for ${STATE_NAMES[stCode]}. Click a suggestion to highlight it on the calendar.`;

  // Cards
  const cardsEl = document.getElementById(`lw-cards-${stCode}`);
  if (cardsEl) {
    if (!sugs.length) { cardsEl.innerHTML = '<div style="font-size:12px;color:var(--txm);padding:8px 0">No opportunities found for selected length.</div>'; }
    else {
      const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      cardsEl.innerHTML = sugs.map((s,i) => {
        const n = s.totalDays;
        const bcls = n>=6?'b-6':n===5?'b-5':n===4?'b-4':'b-3';
        const blbl = n+'‑day break';
        const hnames = s.holDays.map(d=>hSet[dateKey2(d)]?.name||'').filter(Boolean);
        const lnames = s.leaveDays.map(d=>fmtShort(d)).join(', ');
        return `<div class="sug-card${ps.selIdx===i?' sel':''}" onclick="selectLW('${stCode}',${i})">
          <div class="sc-top">
            <div class="sc-dates">${fmtShort(s.start)} – ${fmtShort(s.end)}</div>
            <span class="sc-badge ${bcls}">${blbl}</span>
          </div>
          <div class="sc-hname">${hnames.join(', ')}</div>
          <div class="sc-leave">Take <em>${s.leaveDays.length}</em> leave → ${n} days off</div>
        </div>`;
      }).join('');
    }
  }

  renderPlannerCal(stCode, hSet, sugs, ps.selIdx);
  renderPlannerDetail(stCode, hSet, sugs, ps.selIdx);
}

function selectLW(stCode, idx) {
  plannerState[stCode] = plannerState[stCode] || {};
  plannerState[stCode].selIdx = idx;
  const india = COUNTRIES.find(c => c.id === 'india');
  const data = getStateHolidays(stCode);
  const hSet = buildHolidaySet(data);
  const sugs = plannerState[stCode].sugs || [];
  // Update card selection
  const cardsEl = document.getElementById(`lw-cards-${stCode}`);
  if (cardsEl) cardsEl.querySelectorAll('.sug-card').forEach((el,i) => el.classList.toggle('sel', i===idx));
  renderPlannerCal(stCode, hSet, sugs, idx);
  renderPlannerDetail(stCode, hSet, sugs, idx);
}

function renderPlannerCal(stCode, hSet, sugs, selIdx) {
  const calEl = document.getElementById(`lw-cal-${stCode}`);
  if (!calEl) return;

  // Build leave+lw sets for selected suggestion
  let leaveSet = new Set(), lwSet = new Set();
  if (selIdx !== null && sugs[selIdx]) {
    const s = sugs[selIdx];
    s.leaveDays.forEach(d => leaveSet.add(dateKey2(d)));
    let cur = new Date(s.start);
    while (cur <= s.end) { lwSet.add(dateKey2(cur)); cur = addDays2(cur,1); }
  }

  const today = new Date();
  const MNAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS = ['S','M','T','W','T','F','S'];

  let html = '';
  for (let m=0; m<12; m++) {
    const firstDay = new Date(2026, m, 1).getDay();
    const daysInMonth = new Date(2026, m+1, 0).getDate();
    // Check if this month has any highlight
    let monthHasHL = false;
    for (let d=1;d<=daysInMonth;d++) {
      const k = dateKey2(new Date(2026,m,d));
      if (hSet[k] || leaveSet.has(k) || lwSet.has(k)) { monthHasHL=true; break; }
    }

    html += `<div class="month-block">
      <div class="month-title">${MNAMES[m]} 2026</div>
      <div class="mini-cal">
        <div class="mc-dow">${DOWS.map(d=>`<span>${d}</span>`).join('')}</div>
        <div class="mc-grid">`;

    for (let e=0;e<firstDay;e++) html += `<div class="mc-day empty"></div>`;
    for (let d=1;d<=daysInMonth;d++) {
      const dt = new Date(2026,m,d);
      const k = dateKey2(dt);
      const isH = hSet[k]?.type==='fixed';
      const isWH = hSet[k]?.type==='weekend';
      const isL = leaveSet.has(k);
      const isLW = lwSet.has(k) && !isH && !isL;
      const isSat = dt.getDay()===6, isSun = dt.getDay()===0;
      const isWk = isSat||isSun;
      const isToday = today.getFullYear()===2026&&today.getMonth()===m&&today.getDate()===d;

      let cls = 'mc-day';
      if (isH) cls += ' hday';
      else if (isL) cls += ' leave-d';
      else if (isLW) cls += ' lw-d';
      else if (isWk) cls += ' wkend';
      if (isToday) cls += ' today-d';

      const title = isH ? hSet[k].name : isL ? 'Take leave' : isLW ? 'Long weekend' : isWH ? hSet[k].name+' (holiday on weekend)' : '';
      html += `<div class="${cls}"${title?` title="${title.replace(/"/g,"'")}"`:''}>`;
      html += d;
      if (isH || isL) html += `<span style="display:block;font-size:7px;line-height:1;margin-top:1px;overflow:hidden;white-space:nowrap;max-width:28px">${isL?'off':''}</span>`;
      html += `</div>`;
    }

    html += `</div></div></div>`;
  }
  calEl.innerHTML = html;
}

function renderPlannerDetail(stCode, hSet, sugs, selIdx) {
  const el = document.getElementById(`lw-detail-${stCode}`);
  if (!el) return;
  if (selIdx === null || !sugs[selIdx]) { el.innerHTML = ''; return; }

  const n = s.totalDays;
  const bcls = n>=6?'b-6':n===5?'b-5':n===4?'b-4':'b-3';
  const hnames = s.holDays.map(d=>hSet[dateKey2(d)]?.name||'').filter(Boolean).join(', ');
  const lnames = s.leaveDays.map(d=>fmtShort(d)).join(', ');
  const wnames = s.wkDays.map(d=>fmtShort(d)).join(', ')||'None';
  const stName = STATE_NAMES[stCode];
  el.innerHTML = `<div class="detail-box">

function renderContent() {
  const area = document.getElementById('content-area');
  const query = searchText.toLowerCase();
  const india = COUNTRIES.find(c => c.id === 'india');

  // Search mode — India only, state-aware
  if (query) {
    area.innerHTML = '';
    const view = (currentCountry === 'india') ? 'india-all' : currentCountry;
    const stCode = view.replace('india-', '');
    const searchStates = stCode === 'all' ? Object.keys(STATE_NAMES) : [stCode];
    let totalMatches = 0;
    let html = '';
    searchStates.forEach(sc => {
      const stData = getStateHolidays(sc);
      const all = [];
      (stData.fixed||[]).forEach(h => { if (matchHoliday(h, STATE_NAMES[sc], query)) all.push({...h, type:'fixed'}); });
      (stData.optional||[]).forEach(h => { if (matchHoliday(h, STATE_NAMES[sc], query)) all.push({...h, type:'optional'}); });
      (stData.weekend||[]).forEach(h => { if (matchHoliday(h, STATE_NAMES[sc], query)) all.push({...h, type:'weekend'}); });
      const filtered = all.filter(h => currentFilter==='all' || h.type===currentFilter);
      // Deduplicate across states by holiday name+date
      const unique = filtered.filter((h,i,arr) => arr.findIndex(x=>x.holiday===h.holiday&&x.date===h.date)===i);
      if (!unique.length) return;
      totalMatches += unique.length;
      html += `<div style="margin-bottom:22px">
        ${stCode==='all' ? `<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>📍</span>${hl(STATE_NAMES[sc],query)}</div>` : ''}
        <table class="holiday-table">
          <thead><tr><th>#</th><th>Date</th><th>Holiday</th><th>Type</th></tr></thead>

            <td class="date-cell">${hl(h.date,query)} ${getDayChip(h.date)}</td>
            <td class="holiday-name">${hl(h.holiday,query)}</td>

          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    });

function getMatchingHolidays(c, q) {
  const all = [];
  (c.fixed||[]).forEach(h => { if (matchHoliday(h, c.name, q)) all.push({...h, type:'fixed'}); });
  (c.optional||[]).forEach(h => { if (matchHoliday(h, c.name, q)) all.push({...h, type:'optional'}); });
  (c.weekend||[]).forEach(h => { if (matchHoliday(h, c.name, q)) all.push({...h, type:'weekend'}); });
  return all;
}
function matchHoliday(h, country, q) {
  return h.holiday.toLowerCase().includes(q) || h.date.toLowerCase().includes(q) || country.toLowerCase().includes(q);
}
function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="hl">$1</span>');
}

function renderCountrySearch(c, matches, q) {
  const fixed = matches.filter(h => h.type === 'fixed' && (currentFilter === 'all' || currentFilter === 'fixed'));
  const optional = matches.filter(h => h.type === 'optional' && (currentFilter === 'all' || currentFilter === 'optional'));
  const weekend = matches.filter(h => h.type === 'weekend' && (currentFilter === 'all' || currentFilter === 'weekend'));
  const allFiltered = [...fixed, ...optional, ...weekend];
  if (allFiltered.length === 0) return '';
  return `<div style="margin-bottom:32px">
    <div style="font-size:20px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span>${c.flag}</span><span>${hl(c.name,q)}</span>
      <span style="font-size:13px;color:var(--muted);font-weight:400">${allFiltered.length} match${allFiltered.length>1?'es':''}</span>
    </div>
    ${renderHolidayTableRows(allFiltered, q)}
  </div>`;
}
function renderHolidayTableRows(rows, q='') {
  return `<table class="holiday-table">
    <thead><tr><th>#</th><th>Date</th><th>Holiday</th><th>Type</th></tr></thead>
    <tbody>${rows.map((h,i) => `<tr>
      <td class="sr-cell">${i+1}</td>
      <td class="date-cell">${hl(h.date,q)} ${getDayChip(h.date)}</td>
      <td class="holiday-name">${hl(h.holiday,q)}${h.tentative?'<span class="tentative-tag">Tentative</span>':''}</td>
      <td><span style="font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;background:${h.type==='fixed'?'#e8f5ee':h.type==='optional'?'#e8f0ff':'#fef0ef'};color:${h.type==='fixed'?'#1a6b4a':h.type==='optional'?'#4a2d8a':'#c0392b'}">${h.type}</span></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function getDayChip(dateStr) {
  const day = dateStr.split(',')[0].toLowerCase().slice(0,3);
  const map = {mon:'mon',tue:'tue',wed:'wed',thu:'thu',fri:'fri',sat:'sat',sun:'sun'};
  const cls = map[day] || '';
  const labels = {mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  return `<span class="day-chip ${cls}">${labels[day]||''}</span>`;
}

function renderIndiaOverview(c) {
  // The existing all-states matrix view
  return renderCountry(c);
}

function renderCountry(c) {
  const showFixed = currentFilter === 'all' || currentFilter === 'fixed';
  const showOptional = currentFilter === 'all' || currentFilter === 'optional';
  const showWeekend = currentFilter === 'all' || currentFilter === 'weekend';

  const fixedCount = (c.fixed||[]).length;
  const optCount = (c.optional||[]).length;
  const wkCount = (c.weekend||[]).length;

  let html = `<div class="country-header">
    <div class="country-title-block">

  </div>`;

  // India: state selector tabs + today banner
  if (c.indiaStates) {
    html += stateTabBar('all');
    // For overview, show upcoming across all states (use MH as representative)
    const mhData = getStateHolidays('MH');
    const allFixed = [...mhData.fixed, ...mhData.optional].sort((a,b) => parseDateStr(a.date) - parseDateStr(b.date));

  }

  html += `<div class="stats-row">
    ${c.indiaStates
      ? `<div class="stat-chip green"><span class="num">10–11</span><span>Fixed per state</span></div>

         ${optCount ? `<div class="stat-chip blue"><span class="num">${optCount}</span><span>${c.optionalNote ? 'Optional (choose 5)' : 'Floating / Optional'}</span></div>` : ''}
         ${wkCount ? `<div class="stat-chip orange"><span class="num">${wkCount}</span><span>Fall on weekend</span></div>` : ''}`
    }
  </div>`;

  // Fixed holidays
  if (showFixed && c.fixed && c.fixed.length) {
    if (c.indiaStates) {
      html += renderIndiaStateTable(c.fixed, 'Fixed Holidays');
    } else {
      html += `<div class="section-label">Fixed Public Holidays</div>

          <td class="sr-cell">${i+1}</td>

        </tr>`).join('')}</tbody>
      </table>`;
    }
  }

  // Optional holidays
  if (showOptional && c.optional && c.optional.length) {
    if (c.indiaStates) {
      html += renderIndiaStateTable(c.optional, 'Floating / Optional Holidays', true);
    } else {
      html += `<div class="optional-section">
        <div class="section-label" style="margin:12px 16px 8px">Optional / Floating Holidays${c.optionalNote ? ` <span style="font-size:11px;font-weight:400;color:#4a2d8a;text-transform:none;letter-spacing:0">(${c.optionalNote})</span>` : ''}</div>

          <tbody>${c.optional.map((h,i) => `<tr>
            <td class="sr-cell">${i+1}</td>
            <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>
            <td class="holiday-name">${h.holiday}${h.tentative ? '<span class="tentative-tag">Tentative</span>' : ''}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    }
  }

  // Weekend holidays
  if (showWeekend && c.weekend && c.weekend.length) {
    if (c.indiaStates) {
      html += renderIndiaStateTable(c.weekend, 'Holidays Falling on Weekend');
    } else {
      html += `<div class="weekend-section">
        <div class="section-label" style="margin:12px 16px 8px;color:#c0392b">Holidays Falling on Weekend</div>
        <table class="holiday-table weekend-tbl">
          <thead><tr><th>#</th><th>Date</th><th>Holiday</th></tr></thead>
          <tbody>${c.weekend.map((h,i) => `<tr>
            <td class="sr-cell">${i+1}</td>
            <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>

  if (c.indiaStates && c.stateTotals) {
    html += `<div style="margin:12px 0 8px;padding:10px 14px;background:#f9f8f5;border-radius:8px;border:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center">

  if (c.notes && c.notes.length) {
    html += `<div class="notes-block">${c.notes.map(n=>`<p>— ${n}</p>`).join('')}</div>`;
  }

  return html;
}

function renderIndiaStateTable(holidays, label, isOptional=false) {
  const states = ['MH','KL','TN','KA','TG'];
  const sectionClass = isOptional ? 'optional-section' : '';
  const labelColor = label.includes('Weekend') ? 'color:#c0392b' : '';
  return `<div class="${sectionClass}" style="${isOptional?'':''}">
    <div class="section-label" style="margin:${sectionClass?'12px 16px 8px':'16px 0 10px'};${labelColor}">${label}</div>
    <div style="overflow-x:auto">
    <table class="holiday-table" style="min-width:640px">
      <thead><tr class="state-header-row">
        <th>#</th><th>Date</th><th>Holiday</th>
        ${states.map(s=>`<th style="text-align:center;min-width:86px">${STATE_NAMES[s]}</th>`).join('')}

        <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>
        <td class="holiday-name">${h.holiday}${h.tentative?'<span class="tentative-tag">Tentative</span>':''}</td>

    </table>

  </div>`;
}

function selectCountry(id) {
  currentCountry = id;

  if (id.startsWith('india')) {
    renderContent();
    renderNav();
    return;
  }
  document.querySelectorAll('.country-section').forEach(el => {
    el.classList.toggle('visible', el.id === `section-${id}`);
  });
  document.querySelectorAll('.nav-country').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);

  renderNav();
}

  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
  renderNav();
}

renderNav();
renderContent();

// ── TODAY + UPCOMING HELPERS ──────────────────────────
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function daysUntil(dt) {
  const d = new Date(dt); d.setHours(0,0,0,0);
  return Math.round((d - TODAY) / 86400000);
}

function countdownPill(hDate) {
  const days = daysUntil(hDate);
  if (days < 0) return '';
  if (days === 0) return `<span class="countdown-pill cp-today">Today!</span>`;
  if (days <= 7) return `<span class="countdown-pill cp-next">In ${days}d</span>`;
  if (days <= 30) return `<span class="countdown-pill cp-soon">In ${days}d</span>`;
  return '';
}

function rowClass(hDate) {
  const days = daysUntil(hDate);
  if (days < 0) return 'row-past';
  if (days === 0) return 'row-today';
  return '';  // applied dynamically after finding the first upcoming
}

function buildUpcomingBanner(allHolidays) {
  // allHolidays: array of {date: 'Thu, 1 Jan', holiday: '...'}
  const dated = allHolidays
    .map(h => ({ ...h, dt: parseDateStr(h.date), days: daysUntil(parseDateStr(h.date)) }))
    .filter(h => h.days >= 0)
    .sort((a,b) => a.days - b.days);

  const upcoming = dated.slice(0, 4);  // show next 4

  const dateStr = TODAY.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  if (!upcoming.length) {
    return `<div class="today-banner">
      <div class="today-date-block"><div class="today-label">Today</div><div class="today-value">${dateStr}</div></div>
      <div class="today-divider"></div>
      <div class="upcoming-block"><div class="upcoming-label">Upcoming holidays</div><div class="upcoming-list"><span style="font-size:12px;color:#888">No more holidays in 2026</span></div></div>
    </div>`;
  }

  const items = upcoming.map((h, i) => {
    const dLabel = h.days === 0 ? 'Today!' : `${h.days}d away`;
    const optTag = h.isOptional ? `<span class="up-optional-tag">optional</span>` : '';
    return `<div class="upcoming-item${i===0?' next-h':''}">
      <div>
        <div class="upcoming-name">${h.holiday}${optTag}</div>
        <div class="upcoming-date-s">${h.date}</div>
      </div>
      <div class="upcoming-days-s">${dLabel}</div>
    </div>`;
  }).join('');

  return `<div class="today-banner">
    <div class="today-date-block"><div class="today-label">Today</div><div class="today-value">${dateStr}</div></div>
    <div class="today-divider"></div>
    <div class="upcoming-block"><div class="upcoming-label">Upcoming holidays</div><div class="upcoming-list">${items}</div></div>
  </div>`;
}

// ── Parse "Thu, 1 Jan" → Date object (2026) ──────────
function parseDateStr(s) {
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parts = s.trim().split(/[\s,]+/);
  const day = parseInt(parts[1]);
  const mon = months[parts[2]];
  return new Date(2026, mon, day);
}
function dateKey2(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function addDays2(dt, n) { const d = new Date(dt); d.setDate(d.getDate()+n); return d; }
function fmtShort(dt) { return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

function buildHolidaySet(data) {
  const set = {};
  data.fixed.forEach(h => { const d = parseDateStr(h.date); set[dateKey2(d)] = {name:h.holiday,type:'fixed'}; });
  data.weekend.forEach(h => { const d = parseDateStr(h.date); set[dateKey2(d)] = {name:h.holiday,type:'weekend'}; });
  return set;
}

function findLongWeekends(holidaySet, minLen) {
  const hDates = Object.keys(holidaySet).filter(k => holidaySet[k].type==='fixed').sort();
  const results = [];
  const seen = new Set();

  hDates.forEach(hk => {
    const base = new Date(hk);
    // try window starting 3 days before, ending 3 days after
    for (let startOff = -3; startOff <= 0; startOff++) {
      const start = addDays2(base, startOff);
      if (start.getFullYear() !== 2026) continue;
      for (let len = minLen; len <= 7; len++) {
        const end = addDays2(start, len-1);
        if (end.getFullYear() !== 2026) continue;
        const days = [];
        for (let i=0;i<len;i++) days.push(addDays2(start,i));
        const holDays = days.filter(d => holidaySet[dateKey2(d)]?.type==='fixed');
        const wkDays = days.filter(d => { const w=d.getDay(); return w===0||w===6; });
        const wkendHolDays = days.filter(d => holidaySet[dateKey2(d)]?.type==='weekend');
        const offDays = new Set([...holDays.map(dateKey2), ...wkDays.map(dateKey2), ...wkendHolDays.map(dateKey2)]);
        const leaveDays = days.filter(d => !offDays.has(dateKey2(d)));
        if (holDays.length < 1) continue;
        if (leaveDays.length < 1 || leaveDays.length > 3) continue;
        // All days must be contiguous off or leave
        const key = `${dateKey2(start)}_${dateKey2(end)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        results.push({ start, end, totalDays:len, holDays, wkDays, leaveDays, wkendHolDays, key });
      }
    }
  });

  return results
    .filter(r => r.totalDays >= minLen)
    .sort((a,b) => a.start - b.start);
}

// ── PLANNER STATE ─────────────────────────────────────
const plannerState = {};

function rebuildPlanner(stCode, minLen) {
  plannerState[stCode] = plannerState[stCode] || {};
  plannerState[stCode].minLen = minLen;
  plannerState[stCode].selIdx = null;
  renderPlanner(stCode);
}

function renderPlanner(stCode) {
  const india = COUNTRIES.find(c => c.id === 'india');
  const data = getStateHolidays(stCode);
  const hSet = buildHolidaySet(data);
  const ps = plannerState[stCode] = plannerState[stCode] || {minLen:4, selIdx:null};
  const sugs = findLongWeekends(hSet, ps.minLen);
  ps.sugs = sugs;

  // Summary
  const sumEl = document.getElementById(`lw-summary-${stCode}`);
  if (sumEl) sumEl.innerHTML = `<strong>${sugs.length} long weekend opportunity${sugs.length!==1?'s':''}</strong> found in 2026 for ${STATE_NAMES[stCode]}. Click a suggestion to highlight it on the calendar.`;

  // Cards
  const cardsEl = document.getElementById(`lw-cards-${stCode}`);
  if (cardsEl) {
    if (!sugs.length) { cardsEl.innerHTML = '<div style="font-size:12px;color:var(--txm);padding:8px 0">No opportunities found for selected length.</div>'; }
    else {
      const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      cardsEl.innerHTML = sugs.map((s,i) => {
        const n = s.totalDays;
        const bcls = n>=6?'b-6':n===5?'b-5':n===4?'b-4':'b-3';
        const blbl = n+'‑day break';
        const hnames = s.holDays.map(d=>hSet[dateKey2(d)]?.name||'').filter(Boolean);
        const lnames = s.leaveDays.map(d=>fmtShort(d)).join(', ');
        return `<div class="sug-card${ps.selIdx===i?' sel':''}" onclick="selectLW('${stCode}',${i})">
          <div class="sc-top">
            <div class="sc-dates">${fmtShort(s.start)} – ${fmtShort(s.end)}</div>
            <span class="sc-badge ${bcls}">${blbl}</span>
          </div>
          <div class="sc-hname">${hnames.join(', ')}</div>
          <div class="sc-leave">Take <em>${s.leaveDays.length}</em> leave → ${n} days off</div>
        </div>`;
      }).join('');
    }
  }

  renderPlannerCal(stCode, hSet, sugs, ps.selIdx);
  renderPlannerDetail(stCode, hSet, sugs, ps.selIdx);
}

function selectLW(stCode, idx) {
  plannerState[stCode] = plannerState[stCode] || {};

  if (cardsEl) cardsEl.querySelectorAll('.sug-card').forEach((el,i) => el.classList.toggle('sel', i===idx));
  renderPlannerCal(stCode, hSet, sugs, idx);
  renderPlannerDetail(stCode, hSet, sugs, idx);
}

function renderPlannerCal(stCode, hSet, sugs, selIdx) {
  const calEl = document.getElementById(`lw-cal-${stCode}`);
  if (!calEl) return;

  // Build leave+lw sets for selected suggestion
  let leaveSet = new Set(), lwSet = new Set();
  if (selIdx !== null && sugs[selIdx]) {
    const s = sugs[selIdx];
    s.leaveDays.forEach(d => leaveSet.add(dateKey2(d)));
    let cur = new Date(s.start);
    while (cur <= s.end) { lwSet.add(dateKey2(cur)); cur = addDays2(cur,1); }
  }

  const today = new Date();
  const MNAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS = ['S','M','T','W','T','F','S'];

  let html = '';
  for (let m=0; m<12; m++) {
    const firstDay = new Date(2026, m, 1).getDay();
    const daysInMonth = new Date(2026, m+1, 0).getDate();
    // Check if this month has any highlight
    let monthHasHL = false;
    for (let d=1;d<=daysInMonth;d++) {
      const k = dateKey2(new Date(2026,m,d));
      if (hSet[k] || leaveSet.has(k) || lwSet.has(k)) { monthHasHL=true; break; }
    }

    html += `<div class="month-block">
      <div class="month-title">${MNAMES[m]} 2026</div>
      <div class="mini-cal">
        <div class="mc-dow">${DOWS.map(d=>`<span>${d}</span>`).join('')}</div>
        <div class="mc-grid">`;

    for (let e=0;e<firstDay;e++) html += `<div class="mc-day empty"></div>`;
    for (let d=1;d<=daysInMonth;d++) {
      const dt = new Date(2026,m,d);
      const k = dateKey2(dt);
      const isH = hSet[k]?.type==='fixed';
      const isWH = hSet[k]?.type==='weekend';
      const isL = leaveSet.has(k);
      const isLW = lwSet.has(k) && !isH && !isL;
      const isSat = dt.getDay()===6, isSun = dt.getDay()===0;
      const isWk = isSat||isSun;
      const isToday = today.getFullYear()===2026&&today.getMonth()===m&&today.getDate()===d;

      let cls = 'mc-day';
      if (isH) cls += ' hday';
      else if (isL) cls += ' leave-d';
      else if (isLW) cls += ' lw-d';
      else if (isWk) cls += ' wkend';
      if (isToday) cls += ' today-d';

      const title = isH ? hSet[k].name : isL ? 'Take leave' : isLW ? 'Long weekend' : isWH ? hSet[k].name+' (holiday on weekend)' : '';
      html += `<div class="${cls}"${title?` title="${title.replace(/"/g,"'")}"`:''}>`;
      html += d;
      if (isH || isL) html += `<span style="display:block;font-size:7px;line-height:1;margin-top:1px;overflow:hidden;white-space:nowrap;max-width:28px">${isL?'off':''}</span>`;
      html += `</div>`;
    }

    html += `</div></div></div>`;
  }
  calEl.innerHTML = html;
}

function renderPlannerDetail(stCode, hSet, sugs, selIdx) {
  const el = document.getElementById(`lw-detail-${stCode}`);
  if (!el) return;
  if (selIdx === null || !sugs[selIdx]) { el.innerHTML = ''; return; }
  const s = sugs[selIdx];
  const n = s.totalDays;
  const bcls = n>=6?'b-6':n===5?'b-5':n===4?'b-4':'b-3';
  const hnames = s.holDays.map(d=>hSet[dateKey2(d)]?.name||'').filter(Boolean).join(', ');
  const lnames = s.leaveDays.map(d=>fmtShort(d)).join(', ');
  const wnames = s.wkDays.map(d=>fmtShort(d)).join(', ')||'None';
  const stName = STATE_NAMES[stCode];
  el.innerHTML = `<div class="detail-box">
    <div class="db-title">${fmtShort(s.start)} – ${fmtShort(s.end)} &nbsp;<span class="sc-badge ${bcls}">${n}-day break</span></div>
    <div class="db-row"><span class="db-lbl">Total days off</span><span class="db-val">${n} days</span></div>
    <div class="db-row"><span class="db-lbl">Leave days to apply</span><span class="db-val">${s.leaveDays.length} day${s.leaveDays.length>1?'s':''} — ${lnames}</span></div>
    <div class="db-row"><span class="db-lbl">Holidays</span><span class="db-val">${hnames}</span></div>
    <div class="db-row"><span class="db-lbl">Weekend days</span><span class="db-val">${wnames}</span></div>
    <div class="db-btn"><button class="slds-btn slds-btn-neutral" style="font-size:12px" onclick="sendPrompt('I am planning a long weekend from ${fmtShort(s.start)} to ${fmtShort(s.end)} (${n} days) in ${stName}, India. The holidays are: ${hnames}. I need to take ${s.leaveDays.length} leave day(s) on ${lnames}. Suggest how to make the most of this break — travel ideas from ${stName}, how to plan the leave application, and any tips.')">Plan this trip ↗</button></div>
  </div>`;
}

// ── RENDER CONTENT ────────────────────────────────────
function renderContent() {
  const area = document.getElementById('content-area');
  const query = searchText.toLowerCase();
  const india = COUNTRIES.find(c => c.id === 'india');

  // Search mode — India only, state-aware
  if (query) {
    area.innerHTML = '';
    const view = (currentCountry === 'india') ? 'india-all' : currentCountry;
    const stCode = view.replace('india-', '');
    const searchStates = stCode === 'all' ? Object.keys(STATE_NAMES) : [stCode];
    let totalMatches = 0;
    let html = '';
    searchStates.forEach(sc => {
      const stData = getStateHolidays(sc);
      const all = [];
      (stData.fixed||[]).forEach(h => { if (matchHoliday(h, STATE_NAMES[sc], query)) all.push({...h, type:'fixed'}); });
      (stData.optional||[]).forEach(h => { if (matchHoliday(h, STATE_NAMES[sc], query)) all.push({...h, type:'optional'}); });
      (stData.weekend||[]).forEach(h => { if (matchHoliday(h, STATE_NAMES[sc], query)) all.push({...h, type:'weekend'}); });
      const filtered = all.filter(h => currentFilter==='all' || h.type===currentFilter);
      // Deduplicate across states by holiday name+date
      const unique = filtered.filter((h,i,arr) => arr.findIndex(x=>x.holiday===h.holiday&&x.date===h.date)===i);
      if (!unique.length) return;
      totalMatches += unique.length;
      html += `<div style="margin-bottom:22px">
        ${stCode==='all' ? `<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>📍</span>${hl(STATE_NAMES[sc],query)}</div>` : ''}
        <table class="holiday-table">
          <thead><tr><th>#</th><th>Date</th><th>Holiday</th><th>Type</th></tr></thead>
          <tbody>${unique.map((h,i) => `<tr>
            <td class="sr-cell">${i+1}</td>
            <td class="date-cell">${hl(h.date,query)} ${getDayChip(h.date)}</td>
            <td class="holiday-name">${hl(h.holiday,query)}</td>
            <td><span style="font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;background:${h.type==='fixed'?'#e8f5ee':h.type==='optional'?'#e8f0ff':'#fef0ef'};color:${h.type==='fixed'?'#1a6b4a':h.type==='optional'?'#4a2d8a':'#c0392b'}">${h.type}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    });
    area.innerHTML = html || `<div class="empty-state"><div class="big">🔍</div><p>No holidays found for "<strong>${query}</strong>"</p></div>`;
    document.getElementById('result-count').textContent = totalMatches ? `${totalMatches} result${totalMatches>1?'s':''}` : '';
    return;
  }

  document.getElementById('result-count').textContent = '';
  area.innerHTML = '';

  // Normal view — India only
  const div = document.createElement('div');
  div.className = 'country-section visible';
  div.id = 'section-india-state';

  const view = (currentCountry === 'india') ? 'india-all' : currentCountry;
  const stCode = view.replace('india-', '');

  if (stCode === 'all') {
    div.innerHTML = renderIndiaOverview(india);
  } else {
    div.innerHTML = renderIndiaState(stCode);
  }
  area.appendChild(div);
  if (stCode !== 'all') setTimeout(() => renderPlanner(stCode), 0);
}

function getMatchingHolidays(c, q) {
  const all = [];
  (c.fixed||[]).forEach(h => { if (matchHoliday(h, c.name, q)) all.push({...h, type:'fixed'}); });
  (c.optional||[]).forEach(h => { if (matchHoliday(h, c.name, q)) all.push({...h, type:'optional'}); });
  (c.weekend||[]).forEach(h => { if (matchHoliday(h, c.name, q)) all.push({...h, type:'weekend'}); });
  return all;
}
function matchHoliday(h, country, q) {
  return h.holiday.toLowerCase().includes(q) || h.date.toLowerCase().includes(q) || country.toLowerCase().includes(q);
}
function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="hl">$1</span>');
}

function renderCountrySearch(c, matches, q) {
  const fixed = matches.filter(h => h.type === 'fixed' && (currentFilter === 'all' || currentFilter === 'fixed'));
  const optional = matches.filter(h => h.type === 'optional' && (currentFilter === 'all' || currentFilter === 'optional'));
  const weekend = matches.filter(h => h.type === 'weekend' && (currentFilter === 'all' || currentFilter === 'weekend'));
  const allFiltered = [...fixed, ...optional, ...weekend];
  if (allFiltered.length === 0) return '';
  return `<div style="margin-bottom:32px">
    <div style="font-size:20px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span>${c.flag}</span><span>${hl(c.name,q)}</span>
      <span style="font-size:13px;color:var(--muted);font-weight:400">${allFiltered.length} match${allFiltered.length>1?'es':''}</span>
    </div>
    ${renderHolidayTableRows(allFiltered, q)}
  </div>`;
}
function renderHolidayTableRows(rows, q='') {
  return `<table class="holiday-table">
    <thead><tr><th>#</th><th>Date</th><th>Holiday</th><th>Type</th></tr></thead>
    <tbody>${rows.map((h,i) => `<tr>
      <td class="sr-cell">${i+1}</td>
      <td class="date-cell">${hl(h.date,q)} ${getDayChip(h.date)}</td>
      <td class="holiday-name">${hl(h.holiday,q)}${h.tentative?'<span class="tentative-tag">Tentative</span>':''}</td>
      <td><span style="font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;background:${h.type==='fixed'?'#e8f5ee':h.type==='optional'?'#e8f0ff':'#fef0ef'};color:${h.type==='fixed'?'#1a6b4a':h.type==='optional'?'#4a2d8a':'#c0392b'}">${h.type}</span></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function getDayChip(dateStr) {
  const day = dateStr.split(',')[0].toLowerCase().slice(0,3);
  const map = {mon:'mon',tue:'tue',wed:'wed',thu:'thu',fri:'fri',sat:'sat',sun:'sun'};
  const cls = map[day] || '';
  const labels = {mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat',sun:'Sun'};
  return `<span class="day-chip ${cls}">${labels[day]||''}</span>`;
}

function renderIndiaOverview(c) {
  // The existing all-states matrix view
  return renderCountry(c);
}

function renderCountry(c) {
  const showFixed = currentFilter === 'all' || currentFilter === 'fixed';
  const showOptional = currentFilter === 'all' || currentFilter === 'optional';
  const showWeekend = currentFilter === 'all' || currentFilter === 'weekend';

  const fixedCount = (c.fixed||[]).length;
  const optCount = (c.optional||[]).length;
  const wkCount = (c.weekend||[]).length;

  // For India, badge shows per-state range
  const badge = c.indiaStates
    ? '12–13 holidays per state'
    : `${getTotalCount(c)} holidays`;

  let html = `<div class="country-header">
    <div class="country-title-block">
      <div class="country-flag-lg">${c.flag}</div>
      <div>
        <div class="country-name">${c.name}</div>
        <div class="country-subtitle">Azentio Holiday List · 2026</div>
      </div>
    </div>
    <div class="holiday-count-badge">${badge}</div>
  </div>`;

  // India: state selector tabs + today banner
  if (c.indiaStates) {
    html += stateTabBar('all');
    // For overview, show upcoming across all states (use MH as representative)
    const mhData = getStateHolidays('MH');
    const allFixed = [...mhData.fixed, ...mhData.optional].sort((a,b) => parseDateStr(a.date) - parseDateStr(b.date));
    html += buildUpcomingBanner(allFixed);
  }

  html += `<div class="stats-row">
    ${c.indiaStates
      ? `<div class="stat-chip green"><span class="num">10–11</span><span>Fixed per state</span></div>
         <div class="stat-chip blue"><span class="num">2</span><span>Floating (pick 2)</span></div>
         <div class="stat-chip orange"><span class="num">5 states</span><span>covered</span></div>`
      : `${fixedCount ? `<div class="stat-chip green"><span class="num">${fixedCount}</span><span>Fixed holidays</span></div>` : ''}
         ${optCount ? `<div class="stat-chip blue"><span class="num">${optCount}</span><span>${c.optionalNote ? 'Optional (choose 5)' : 'Floating / Optional'}</span></div>` : ''}
         ${wkCount ? `<div class="stat-chip orange"><span class="num">${wkCount}</span><span>Fall on weekend</span></div>` : ''}`
    }
  </div>`;

  // Fixed holidays
  if (showFixed && c.fixed && c.fixed.length) {
    if (c.indiaStates) {
      html += renderIndiaStateTable(c.fixed, 'Fixed Holidays');
    } else {
      html += `<div class="section-label">Fixed Public Holidays</div>
      <table class="holiday-table">
        <thead><tr><th>#</th><th>Date</th><th>Holiday</th></tr></thead>
        <tbody>${c.fixed.map((h,i) => `<tr>
          <td class="sr-cell">${i+1}</td>
          <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>
          <td class="holiday-name">${h.holiday}${h.tentative ? '<span class="tentative-tag">Tentative</span>' : ''}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }
  }

  // Optional holidays
  if (showOptional && c.optional && c.optional.length) {
    if (c.indiaStates) {
      html += renderIndiaStateTable(c.optional, 'Floating / Optional Holidays', true);
    } else {
      html += `<div class="optional-section">
        <div class="section-label" style="margin:12px 16px 8px">Optional / Floating Holidays${c.optionalNote ? ` <span style="font-size:11px;font-weight:400;color:#4a2d8a;text-transform:none;letter-spacing:0">(${c.optionalNote})</span>` : ''}</div>
        <table class="holiday-table optional-tbl">
          <thead><tr><th>#</th><th>Date</th><th>Holiday</th></tr></thead>
          <tbody>${c.optional.map((h,i) => `<tr>
            <td class="sr-cell">${i+1}</td>
            <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>
            <td class="holiday-name">${h.holiday}${h.tentative ? '<span class="tentative-tag">Tentative</span>' : ''}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    }
  }

  // Weekend holidays
  if (showWeekend && c.weekend && c.weekend.length) {
    if (c.indiaStates) {
      html += renderIndiaStateTable(c.weekend, 'Holidays Falling on Weekend');
    } else {
      html += `<div class="weekend-section">
        <div class="section-label" style="margin:12px 16px 8px;color:#c0392b">Holidays Falling on Weekend</div>
        <table class="holiday-table weekend-tbl">
          <thead><tr><th>#</th><th>Date</th><th>Holiday</th></tr></thead>
          <tbody>${c.weekend.map((h,i) => `<tr>
            <td class="sr-cell">${i+1}</td>
            <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>
            <td class="holiday-name">${h.holiday}${h.tentative ? '<span class="tentative-tag">Tentative</span>' : ''}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    }
  }

  // India state totals
  if (c.indiaStates && c.stateTotals) {
    html += `<div style="margin:12px 0 8px;padding:10px 14px;background:#f9f8f5;border-radius:8px;border:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;font-weight:600;color:var(--muted)">TOTAL DAYS:</span>
      ${Object.entries(c.stateTotals).map(([s,n]) => `<span style="font-size:13px"><strong>${STATE_NAMES[s]}</strong> <span style="color:var(--accent);font-weight:700">${n}</span></span>`).join(' &nbsp;·&nbsp; ')}
    </div>`;
  }

  // Notes
  if (c.notes && c.notes.length) {
    html += `<div class="notes-block">${c.notes.map(n=>`<p>— ${n}</p>`).join('')}</div>`;
  }

  return html;
}

function renderIndiaStateTable(holidays, label, isOptional=false) {
  const states = ['MH','KL','TN','KA','TG'];
  const sectionClass = isOptional ? 'optional-section' : '';
  const labelColor = label.includes('Weekend') ? 'color:#c0392b' : '';
  return `<div class="${sectionClass}" style="${isOptional?'':''}">
    <div class="section-label" style="margin:${sectionClass?'12px 16px 8px':'16px 0 10px'};${labelColor}">${label}</div>
    <div style="overflow-x:auto">
    <table class="holiday-table" style="min-width:640px">
      <thead><tr class="state-header-row">
        <th>#</th><th>Date</th><th>Holiday</th>
        ${states.map(s=>`<th style="text-align:center;min-width:86px">${STATE_NAMES[s]}</th>`).join('')}
      </tr></thead>
      <tbody>${holidays.map((h,i) => `<tr>
        <td class="sr-cell">${i+1}</td>
        <td class="date-cell">${h.date} ${getDayChip(h.date)}</td>
        <td class="holiday-name">${h.holiday}${h.tentative?'<span class="tentative-tag">Tentative</span>':''}</td>
        ${states.map(s => `<td style="text-align:center">${(h.states||[]).includes(s) ? '<span style="color:var(--accent);font-size:16px">✓</span>' : '<span style="color:#e0ddd7">—</span>'}</td>`).join('')}
      </tr>`).join('')}</tbody>
    </table>
    </div>
  </div>`;
}

// ── CONTROLS ──────────────────────────────────────────
function selectCountry(id) {
  currentCountry = id;
  // For India state sub-views, re-render content directly
  if (id.startsWith('india')) {
    renderContent();
    renderNav();
    return;
  }
  document.querySelectorAll('.country-section').forEach(el => {
    el.classList.toggle('visible', el.id === `section-${id}`);
  });
  document.querySelectorAll('.nav-country').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  renderNav();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
  renderNav();
}

document.getElementById('search-input').addEventListener('input', function() {
  searchText = this.value.trim();
  renderNav();
  renderContent();
});

// ── TODAY ─────────────────────────────────────────────
const now = new Date();
document.getElementById('today-display').textContent = now.toLocaleDateString('en-GB', {weekday:'short',day:'numeric',month:'short',year:'numeric'});

// ── INIT ──────────────────────────────────────────────
renderNav();
renderContent();
</script>
